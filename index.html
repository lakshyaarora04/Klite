<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klite — The Hyperlocal B2B Exchange</title>
  <meta name="description" content="Optimize your supply chain by discovering essential surplus from verified local partners. High-quality inventory, reduced logistics, sustainable growth." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23003426'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Manrope' font-weight='800' font-size='18'%3EIX%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Global Navigation -->
  <nav id="global-nav" class="glass-nav">
    <div class="nav-inner">
      <div class="nav-left">
        <a href="#" id="nav-logo" class="nav-logo" data-navigate="browse">K<span class="logo-accent">lite</span></a>
        <div class="nav-links">
          <a href="#" class="nav-link" data-navigate="browse" id="nav-browse">Browse</a>
          <a href="#" class="nav-link" data-navigate="network" id="nav-network">Network</a>
        </div>
      </div>
      <div class="nav-right">
        <div class="nav-search-wrapper" id="nav-search-wrapper">
          <svg class="nav-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="nav-search" class="nav-search" placeholder="Search surplus inventory..." />
        </div>
        <button class="nav-icon-btn" id="nav-notifications" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notification-dot" id="notification-dot"></span>
        </button>
        <button class="nav-icon-btn" id="nav-profile" aria-label="Profile">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Notification Panel -->
  <div id="notification-panel" class="notification-panel hidden">
    <div class="notif-header">
      <h3>Notifications</h3>
      <button id="notif-clear" class="btn-tertiary btn-sm">Mark all read</button>
    </div>
    <div id="notif-list" class="notif-list"></div>
  </div>

  <!-- Profile Dropdown -->
  <div id="profile-dropdown" class="profile-dropdown hidden">
    <div class="profile-header">
      <div class="profile-avatar">DA</div>
      <div>
        <div class="profile-name">Deepak Arora</div>
        <div class="profile-email">deepak@example.com</div>
      </div>
    </div>
    <div class="profile-menu">
      <a href="#" data-navigate="office" class="profile-menu-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="#" class="profile-menu-item" id="profile-settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
      <a href="#" class="profile-menu-item" id="profile-logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log Out
      </a>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main Content Area -->
  <main id="app-main" class="app-main">
    <!-- Views are rendered here by JS router -->
  </main>

  <!-- Bottom Navigation (Mobile-style for tab switching) -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="bottom-nav-item active" data-navigate="browse" id="bnav-market">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Market</span>
    </button>
    <button class="bottom-nav-item" data-navigate="negotiate" id="bnav-negotiate">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      <span>Negotiate</span>
    </button>
    <button class="bottom-nav-item" data-navigate="logistics" id="bnav-logistics">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      <span>Logistics</span>
    </button>
    <button class="bottom-nav-item" data-navigate="office" id="bnav-office">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      <span>Office</span>
    </button>
  </nav>

  <!-- Modals -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
